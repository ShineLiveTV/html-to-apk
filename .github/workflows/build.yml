name: Build APK from Telegram

on:
  workflow_dispatch:
    inputs:
      file_path: {description: 'Path', required: true}
      icon_path: {description: 'Icon Path', required: true}
      chat_id: {description: 'Chat ID', required: true}
      app_name: {description: 'App Name', required: true}
      pass_word: {description: 'Password', required: true}
      audio_path: {description: 'Audio Path', required: true}
      expiry_days: {description: 'Expiry Limit', required: true}
      app_version: {description: 'App Version', required: true}
      update_link: {description: 'Update Link', required: true}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Java
        uses: actions/setup-java@v3
        with: {distribution: 'temurin', java-version: '17'}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: {node-version: '18'}
      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.shine.app${{ github.run_number }} "${{ github.event.inputs.app_name }}"
          cd myapp
          
          # HTML ဖိုင်ကို index အဖြစ် တိုက်ရိုက်မသိမ်းဘဲ user.html အဖြစ် ခွဲသိမ်းခြင်း
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.file_path }}" -o user.html
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.icon_path }}" -o icon.jpg
          
          if [ "${{ github.event.inputs.audio_path }}" != "No" ]; then
            curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.audio_path }}" -o www/bgm.mp3
            sed -i 's|</widget>|    <preference name="MediaPlaybackRequiresUserAction" value="false" />\n</widget>|g' config.xml
          fi

          sed -i 's|<widget |<widget xmlns:android="http://schemas.android.com/apk/res/android" |g' config.xml
          sed -i 's|</widget>|    <platform name="android">\n        <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">\n            <application android:usesCleartextTraffic="true" />\n        </edit-config>\n    </platform>\n</widget>|g' config.xml
          sed -i 's|</widget>|    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="http://*/*" />\n    <allow-intent href="https://*/*" />\n</widget>|g' config.xml

          # 🔒 စာဝှက်စနစ် (Base64 Encode) - ဤစနစ်သည် မြန်ဆန်ပြီး Error လုံးဝမတက်ပါ
          USER_B64=$(base64 -w 0 user.html)

          cat << 'EOF' > www/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <style>
              /* 🚫 Anti-Copy စနစ် (စာသားများကို ဖိ၍ Copy ကူးခွင့်ပိတ်ခြင်း) */
              * { -webkit-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }
            </style>
          </head>
          <body oncontextmenu="return false;" style="background:#0f0f13; margin:0; padding:0;">
            
            <script>
              // ဝှက်ထားသော စာသားများကို App ဖွင့်ချိန်မှသာ ပြန်ဖော်ပြခြင်း
              var b64 = "USER_B64_PLACEHOLDER";
              var decoded = decodeURIComponent(escape(atob(b64)));
              decoded = decoded.replace(/<meta[^>]*Content-Security-Policy[^>]*>/gi, '');
              document.write(decoded);
            </script>

            <script>
              var aud = "${{ github.event.inputs.audio_path }}";
              if(aud !== "No"){ var a = document.createElement("audio"); a.src = "bgm.mp3"; a.autoplay = true; a.loop = true; document.documentElement.appendChild(a); }

              var st = document.createElement('style');
              st.innerHTML = `
                @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
                @keyframes splashPulse { 0% { transform: scale(0.95); box-shadow: 0 10px 20px rgba(0,201,255,0.2); } 100% { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,201,255,0.6); } }
                @keyframes splashSpin { 100% { transform: rotate(360deg); } }
                @keyframes splashFade { 0% { opacity: 0.5; } 100% { opacity: 1; } }
                .shine-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; background: #0f0f13 !important; z-index: 2147483647 !important; display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; font-family: 'Segoe UI', sans-serif !important; }
                .shine-card { background: linear-gradient(145deg, #252525, #151515) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 25px !important; padding: 40px 30px !important; text-align: center !important; box-shadow: 0 20px 50px rgba(0,0,0,0.9) !important; animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards !important; max-width: 85% !important; width: 340px !important; color: #fff !important; box-sizing: border-box !important; }
                .shine-input { width: 100% !important; padding: 16px !important; margin: 20px 0 !important; box-sizing: border-box !important; border: 1px solid rgba(255,255,255,0.2) !important; border-radius: 14px !important; background: rgba(0,0,0,0.6) !important; color: #fff !important; text-align: center !important; font-size: 16px !important; outline: none !important; transition: border 0.3s !important; }
                .shine-input:focus { border: 1px solid #00C9FF !important; }
                .shine-btn { background: linear-gradient(45deg, #00C9FF, #92FE9D) !important; padding: 16px 35px !important; color: #000 !important; border-radius: 30px !important; border: none !important; font-weight: bold !important; font-size: 17px !important; cursor: pointer !important; width: 100% !important; text-transform: uppercase !important; box-sizing: border-box !important; }
                .s-timer { position: fixed !important; bottom: 20px !important; right: 20px !important; background: rgba(20,20,20,0.9) !important; color: #00C9FF !important; padding: 10px 20px !important; border-radius: 30px !important; font-size: 14px !important; z-index: 2147483647 !important; pointer-events: none !important; font-weight: bold !important; border: 1px solid rgba(255,255,255,0.2) !important; }
              `;
              document.documentElement.appendChild(st);

              // 🎨 FEATURE 5: CUSTOM ANIMATED SPLASH SCREEN
              var sp_ol = document.createElement('div');
              sp_ol.id = 'shine_premium_splash';
              sp_ol.className = 'shine-overlay';
              sp_ol.style.transition = 'opacity 0.8s ease-out';
              sp_ol.innerHTML = '<img src="icon.jpg" style="width:130px;height:130px;border-radius:30px;animation:splashPulse 1.5s infinite alternate;box-shadow:0 15px 35px rgba(0,201,255,0.4);"><div style="margin-top:40px;width:45px;height:45px;border:4px solid rgba(255,255,255,0.1);border-top-color:#00C9FF;border-radius:50%;animation:splashSpin 1s linear infinite;"></div><h3 style="color:#fff; margin-top:25px; font-family:sans-serif; letter-spacing:2px; animation: splashFade 1.5s infinite alternate;">${{ github.event.inputs.app_name }}</h3>';
              document.documentElement.appendChild(sp_ol);

              setTimeout(function(){
                  var sp = document.getElementById('shine_premium_splash');
                  if(sp) { sp.style.opacity = '0'; setTimeout(function(){ sp.remove(); }, 800); }
              }, 3500);

              // PASSWORD
              var pw = "${{ github.event.inputs.pass_word }}";
              if(pw !== "No"){
                var pwd_ol = document.createElement('div'); pwd_ol.className = 'shine-overlay';
                pwd_ol.innerHTML = '<div class="shine-card"><div style="font-size:55px;margin-bottom:15px;">🔐</div><h2 style="margin:0;font-size:24px;color:#fff;">Security Check</h2><p style="font-size:14px;color:#aaa;margin-top:8px;">Please enter password to continue</p><input type="password" id="pwd_in" class="shine-input" placeholder="Enter Password"><button onclick="checkPw()" class="shine-btn">Unlock App</button><div id="pwd_err" style="color:#ff4d4d;margin-top:15px;display:none;font-size:14px;font-weight:bold;">❌ Incorrect Password!</div></div>';
                document.documentElement.appendChild(pwd_ol);
                window.checkPw = function(){ 
                  if(document.getElementById("pwd_in").value === pw) { pwd_ol.remove(); } 
                  else { document.getElementById("pwd_err").style.display = "block"; } 
                };
              }

              // EXPIRY TIMER
              var e = "${{ github.event.inputs.expiry_days }}";
              if(e !== "No"){
                var m = 0; if(e.toLowerCase().endsWith("h")) m = parseFloat(e)*36e5; else m = parseFloat(e)*864e5;
                var i = localStorage.getItem("app_inst"); if(!i){ i = Date.now(); localStorage.setItem("app_inst", i); }
                var exp = parseInt(i) + m;
                setInterval(function(){
                  var n = Date.now();
                  if(n > exp){ 
                    var ex_ol = document.getElementById('shine_exp_overlay');
                    if(!ex_ol){
                        ex_ol = document.createElement("div"); ex_ol.id = 'shine_exp_overlay'; ex_ol.className = "shine-overlay";
                        ex_ol.innerHTML = '<div class="shine-card" style="border-color:rgba(255,77,77,0.3);"><div style="font-size:55px;margin-bottom:15px;">⏳</div><h2 style="color:#ff4d4d;margin:0;font-size:24px;">App Expired!</h2><p style="color:#ccc;font-size:15px;margin-top:15px;">ဒီ App ရဲ့ သက်တမ်း ကုန်ဆုံးသွားပါပြီ။</p></div>';
                        document.documentElement.appendChild(ex_ol);
                    }
                    return; 
                  }
                  var t = document.getElementById("s_tmr");
                  if(!t){ t = document.createElement("div"); t.id = "s_tmr"; t.className = "s-timer"; document.documentElement.appendChild(t); }
                  var l = exp - n; var h = Math.floor(l/36e5); var mn = Math.floor((l%36e5)/60000); var s = Math.floor((l%60000)/1000);
                  t.innerHTML = "⏳ " + h + "h " + mn + "m " + s + "s left";
                }, 500);
              }

              // VPS API UPDATE CHECKER
              var cur_v = "${{ github.event.inputs.app_version }}".trim(); 
              var safe_name = encodeURIComponent("${{ github.event.inputs.app_name }}".replace(/ /g, "_").toLowerCase());
              var api_url = "http://168.144.47.212:5000/update/" + safe_name;
              
              function showUpdate(newV, link) {
                  if(document.getElementById('shine_update_overlay')) return;
                  var ol = document.createElement('div');
                  ol.id = 'shine_update_overlay';
                  ol.className = 'shine-overlay';
                  ol.innerHTML = '<div class="shine-card"><div style="font-size:60px;margin-bottom:15px;">🚀</div><h2 style="margin:0 0 10px 0;color:#fff;font-size:24px;">Update Available!</h2><p style="color:#ddd;font-size:15px;margin-bottom:25px;line-height:1.5;">Version <b style="color:#00C9FF;font-size:19px;">' + newV + '</b> အသစ်ထွက်နေပါပြီ။<br><br><span style="color:#aaa;font-size:13px;">အောက်ကခလုတ်ကိုနှိပ်ပြီး အသစ်ကို ဒေါင်းလုဒ်ဆွဲပါ။</span></p><button onclick="window.location.href=\'' + link + '\'" class="shine-btn">Download Now</button></div>';
                  document.documentElement.appendChild(ol);
                  
                  if(document.body) { document.body.style.pointerEvents = 'none'; document.body.style.overflow = 'hidden'; }
                  ol.style.pointerEvents = 'auto';

                  setInterval(function(){
                      var el = document.getElementById('shine_update_overlay');
                      if(!el) document.documentElement.appendChild(ol);
                  }, 500);
              }

              function fetchUpdate() {
                  fetch(api_url, { cache: "no-store" })
                  .then(r => r.json())
                  .then(data => {
                      if(data && data.version && parseFloat(data.version) > parseFloat(cur_v)) { showUpdate(data.version, data.link); }
                  }).catch(err => { });
              }
              fetchUpdate(); setInterval(fetchUpdate, 5000); 
            </script>
          </body>
          </html>
          EOF

          # စာဝှက်ထားသော Code များကို index.html သို့ အစားထိုးထည့်သွင်းခြင်း
          sed -i "s#USER_B64_PLACEHOLDER#${USER_B64}#g" www/index.html

          cordova plugin add cordova-plugin-splashscreen
          sed -i 's|</widget>|    <icon src="icon.jpg" />\n    <preference name="SplashScreenDelay" value="0" />\n    <preference name="FadeSplashScreenDuration" value="0"/>\n    <preference name="SplashMaintainAspectRatio" value="true" />\n</widget>|g' config.xml
          
          cordova platform add android
          cordova build android

      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument

