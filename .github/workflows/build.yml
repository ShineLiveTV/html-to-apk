name: Build APK from Telegram

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path'
        required: true
      chat_id:
        description: 'Chat ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.tgbot.app MyApp
          cd myapp
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.file_path }}" -o www/index.html
          cordova platform add android
          cordova build android

      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
