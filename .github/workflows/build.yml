name: Build APK from Telegram

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path'
        required: true
      icon_path:
        description: 'Icon Path'
        required: true
      chat_id:
        description: 'Chat ID'
        required: true
      app_name:
        description: 'App Name'
        required: true
      pass_word:
        description: 'Password'
        required: true
      audio_path:
        description: 'Audio Path'
        required: true
      expiry_days:
        description: 'Expiry Limit'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.shine.app${{ github.run_number }} "${{ github.event.inputs.app_name }}"
          cd myapp
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.file_path }}" -o www/index.html
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.icon_path }}" -o icon.jpg
          
          if [ "${{ github.event.inputs.audio_path }}" != "No" ]; then
            curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.audio_path }}" -o www/bgm.mp3
            sed -i 's|</widget>|    <preference name="MediaPlaybackRequiresUserAction" value="false" />\n</widget>|g' config.xml
          fi

          # Force Inject UI (100% Works on Any HTML)
          cat << 'EOF' >> www/index.html
          <script>
            // Audio Inject
            var aud = "${{ github.event.inputs.audio_path }}";
            if(aud !== "No"){
              var a = document.createElement("audio");
              a.src = "bgm.mp3"; a.autoplay = true; a.loop = true;
              document.documentElement.appendChild(a);
            }

            // Expiry Timer Inject (Force Stay on Top)
            var e = "${{ github.event.inputs.expiry_days }}";
            if(e !== "No"){
              var m = 0;
              if(e.toLowerCase().endsWith("h")) m = parseFloat(e) * 36e5;
              else m = parseFloat(e) * 864e5;
              var i = localStorage.getItem("app_inst");
              if(!i){ i = Date.now(); localStorage.setItem("app_inst", i); }
              var exp = parseInt(i) + m;
              
              setInterval(function(){
                var n = Date.now();
                if(n > exp){
                  document.body.innerHTML = "<div style='height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:#000;color:red;font-size:24px;z-index:2147483647;position:fixed;top:0;left:0;font-weight:bold;'>⚠️ App Expired!</div>";
                  return;
                }
                var t = document.getElementById("s_tmr");
                if(!t){
                  t = document.createElement("div");
                  t.id = "s_tmr";
                  t.style.cssText = "position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.85);color:#FFD700;padding:10px 15px;border-radius:30px;font-size:14px;font-family:sans-serif;z-index:2147483647;pointer-events:none;font-weight:bold;border:2px solid #333;box-shadow:0 0 15px rgba(0,0,0,0.8);";
                  if(document.body) document.body.appendChild(t);
                }
                var l = exp - n;
                var h = Math.floor(l / 36e5);
                var mn = Math.floor((l % 36e5) / 60000);
                var s = Math.floor((l % 60000) / 1000);
                t.innerHTML = "⏳ " + h + "h " + mn + "m " + s + "s left";
              }, 500);
            }

            // Password Inject
            var pw = "${{ github.event.inputs.pass_word }}";
            if(pw !== "No"){
              var overlay = document.createElement('div');
              overlay.id = 'pwd_overlay';
              overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#111;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;';
              overlay.innerHTML = '<h2 style="color:#fff;font-family:sans-serif;">🔐 Enter Password</h2><input type="password" id="pwd_in" style="margin:15px;padding:12px;border-radius:8px;border:none;text-align:center;font-size:18px;width:250px;"><button onclick="checkPw()" style="padding:12px 25px;background:#FFD700;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;">Unlock</button><div id="pwd_err" style="color:red;margin-top:15px;display:none;font-family:sans-serif;">Incorrect Password!</div>';
              document.documentElement.appendChild(overlay);
              window.checkPw = function(){
                if(document.getElementById("pwd_in").value === pw){
                  overlay.style.display = "none";
                }else{
                  document.getElementById("pwd_err").style.display = "block";
                }
              };
            }
          </script>
          EOF

          # Splash Screen Config
          cordova plugin add cordova-plugin-splashscreen
          sed -i 's|</widget>|    <icon src="icon.jpg" />\n    <preference name="SplashScreenDelay" value="3000" />\n    <preference name="FadeSplashScreenDuration" value="1000"/>\n    <preference name="SplashMaintainAspectRatio" value="true" />\n</widget>|g' config.xml
          
          cordova platform add android
          cordova build android

      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
