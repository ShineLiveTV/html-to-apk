name: Build APK from Telegram

on:
  workflow_dispatch:
    inputs:
      file_path: {description: 'Path', required: true}
      icon_path: {description: 'Icon Path', required: true}
      chat_id: {description: 'Chat ID', required: true}
      app_name: {description: 'App Name', required: true}
      pass_word: {description: 'Password', required: true}
      audio_path: {description: 'Audio Path', required: true}
      expiry_days: {description: 'Expiry Limit', required: true}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Java
        uses: actions/setup-java@v3
        with: {distribution: 'temurin', java-version: '17'}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: {node-version: '18'}
      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.shine.app${{ github.run_number }} "${{ github.event.inputs.app_name }}"
          cd myapp
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.file_path }}" -o www/index.html
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.icon_path }}" -o icon.jpg
          
          if [ "${{ github.event.inputs.audio_path }}" != "No" ]; then
            curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.audio_path }}" -o www/bgm.mp3
            sed -i 's|</widget>|    <preference name="MediaPlaybackRequiresUserAction" value="false" />\n</widget>|g' config.xml
          fi

          sed -i 's|</widget>|    <access origin="*" />\n    <allow-navigation href="*" />\n    <allow-intent href="http://*/*" />\n    <allow-intent href="https://*/*" />\n</widget>|g' config.xml

          cat << 'EOF' >> www/index.html
          <style>
            @keyframes popIn { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
            @keyframes spin { 100% { transform: rotate(360deg); } }
            @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
            .full-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; background: rgba(15,15,15,0.95) !important; z-index: 2147483647 !important; display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; margin: 0 !important; padding: 0 !important; }
            .glass-card { background: rgba(30, 30, 30, 0.8) !important; backdrop-filter: blur(15px) !important; -webkit-backdrop-filter: blur(15px) !important; border: 1px solid rgba(255, 255, 255, 0.15) !important; border-radius: 20px !important; padding: 35px 25px !important; text-align: center !important; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8) !important; animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards !important; max-width: 85% !important; width: 320px !important; color: #fff !important; box-sizing: border-box !important; }
            .input-glass { width: 100% !important; padding: 14px !important; margin: 20px 0 !important; box-sizing: border-box !important; border: 1px solid rgba(255,255,255,0.2) !important; border-radius: 12px !important; background: rgba(0,0,0,0.6) !important; color: #fff !important; text-align: center !important; font-size: 16px !important; outline: none !important; }
            .btn-grad { background-image: linear-gradient(to right, #00C9FF 0%, #92FE9D 51%, #00C9FF 100%) !important; margin: 5px 0 0 0 !important; padding: 14px 30px !important; text-align: center !important; background-size: 200% auto !important; color: #000 !important; box-shadow: 0 4px 15px rgba(0,201,255,0.4) !important; border-radius: 25px !important; border: none !important; font-weight: bold !important; font-size: 16px !important; cursor: pointer !important; width: 100% !important; }
            .btn-warn { background-image: linear-gradient(to right, #f12711 0%, #f5af19 51%, #f12711 100%) !important; color: #fff !important; box-shadow: 0 4px 15px rgba(241,39,17,0.4) !important; }
            .s-timer { position: fixed !important; bottom: 20px !important; right: 20px !important; background: rgba(20,20,20,0.8) !important; color: #00C9FF !important; padding: 8px 16px !important; border-radius: 20px !important; font-size: 13px !important; z-index: 2147483647 !important; pointer-events: none !important; font-weight: bold !important; border: 1px solid rgba(255,255,255,0.2) !important; font-family: sans-serif !important; }
          </style>
          <script>
            var aud = "${{ github.event.inputs.audio_path }}";
            if(aud !== "No"){ var a = document.createElement("audio"); a.src = "bgm.mp3"; a.autoplay = true; a.loop = true; document.documentElement.appendChild(a); }

            var pw = "${{ github.event.inputs.pass_word }}";
            if(pw !== "No"){
              var pwd_ol = document.createElement('div'); pwd_ol.id = 'pwd_overlay'; pwd_ol.className = 'full-overlay';
              pwd_ol.innerHTML = '<div class="glass-card"><div style="font-size:45px;margin-bottom:10px;">🔐</div><h2 style="margin:0;">Security Check</h2><p style="font-size:14px;color:#aaa;margin-top:5px;">Please enter password to continue</p><input type="password" id="pwd_in" class="input-glass" placeholder="Enter Password"><button onclick="checkPw()" class="btn-grad">Unlock App</button><div id="pwd_err" style="color:#ff4d4d;margin-top:15px;display:none;font-size:14px;font-weight:bold;">❌ Incorrect Password!</div></div>';
              document.documentElement.appendChild(pwd_ol);
              window.checkPw = function(){ 
                if(document.getElementById("pwd_in").value === pw) {
                  pwd_ol.style.animation = "fadeOut 0.5s forwards"; setTimeout(function(){pwd_ol.remove();}, 500);
                } else { 
                  var err = document.getElementById("pwd_err"); err.style.display = "block"; err.style.animation = "none"; void err.offsetWidth; err.style.animation = "popIn 0.3s";
                } 
              };
            }

            var e = "${{ github.event.inputs.expiry_days }}";
            if(e !== "No"){
              var m = 0; if(e.toLowerCase().endsWith("h")) m = parseFloat(e)*36e5; else m = parseFloat(e)*864e5;
              var i = localStorage.getItem("app_inst"); if(!i){ i = Date.now(); localStorage.setItem("app_inst", i); }
              var exp = parseInt(i) + m;
              setInterval(function(){
                var n = Date.now();
                if(n > exp){ 
                  if(document.body) document.body.innerHTML = "";
                  var ex_ol = document.createElement("div"); ex_ol.className = "full-overlay";
                  ex_ol.innerHTML = '<div class="glass-card" style="border-color:#ff4d4d;"><div style="font-size:50px;margin-bottom:10px;">⏳</div><h2 style="color:#ff4d4d;margin:0;">App Expired!</h2><p style="color:#ccc;font-size:14px;margin-top:15px;">ဒီ App ရဲ့ သက်တမ်း ကုန်ဆုံးသွားပါပြီ။</p></div>';
                  document.documentElement.appendChild(ex_ol);
                  return; 
                }
                var t = document.getElementById("s_tmr");
                if(!t){ t = document.createElement("div"); t.id = "s_tmr"; t.className = "s-timer"; if(document.body) document.body.appendChild(t); }
                var l = exp - n; var h = Math.floor(l/36e5); var mn = Math.floor((l%36e5)/60000); var s = Math.floor((l%60000)/1000);
                t.innerHTML = "⏳ " + h + "h " + mn + "m " + s + "s left";
              }, 500);
            }

            var app_name = "${{ github.event.inputs.app_name }}".toLowerCase().trim();
            setTimeout(function(){
              var check_url = "https://raw.githubusercontent.com/${{ github.repository }}/main/force_update.json?t=" + Date.now();
              fetch(check_url, { cache: "no-store" })
              .then(r => { if(r.ok) return r.json(); return {}; })
              .then(data => {
                if(data && data[app_name]){
                  var dl_link = data[app_name];
                  var load_ol = document.createElement('div'); load_ol.className = 'full-overlay';
                  load_ol.innerHTML = '<div class="glass-card"><div style="font-size:50px; margin-bottom:10px;">🚀</div><h2 style="margin:0; color:#fff;">Update Available!</h2><p style="color:#eee; font-size:16px; margin:15px 0;">App အသစ်ထွက်နေပါပြီ။</p><p style="font-size:13px; color:#aaa; margin-bottom:25px;">အောက်က ခလုတ်ကိုနှိပ်ပြီး အသစ်ကို ဒေါင်းလုဒ်ဆွဲပါ။</p><button onclick="window.location.href=\'' + dl_link + '\'" class="btn-grad btn-warn">Download Now</button></div>';
                  if(document.body) document.body.innerHTML = ""; 
                  setInterval(function(){
                    if(document.body && document.body.innerHTML !== "") document.body.innerHTML = "";
                    if(!document.documentElement.contains(load_ol)) document.documentElement.appendChild(load_ol);
                  }, 500);
                }
              }).catch(e => {});
            }, 2500);
          </script>
          EOF
          
          cordova plugin add cordova-plugin-splashscreen
          sed -i 's|</widget>|    <icon src="icon.jpg" />\n    <preference name="SplashScreenDelay" value="3000" />\n    <preference name="FadeSplashScreenDuration" value="1000"/>\n    <preference name="SplashMaintainAspectRatio" value="true" />\n</widget>|g' config.xml
          cordova platform add android
          cordova build android
      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
                window.lastErr = "";
                function checkUpdate(idx) {
                  if(idx >= urls.length) { 
                      // အကယ်၍ Error ဖြစ်ခဲ့ပါက User ကို ပြသရန်
                      load_ol.innerHTML = '<div class="glass-card"><h3 style="color:#ff4d4d;margin:0;">⚠️ Check Failed</h3><p style="color:#aaa;font-size:13px;margin-top:10px;">Error: ' + window.lastErr + '</p></div>';
                      setTimeout(function(){load_ol.style.animation = "fadeOut 0.5s forwards"; setTimeout(function(){load_ol.remove();},500);}, 4000);
                      return; 
                  }
                  fetch(urls[idx], { cache: "no-store" })
                  .then(r => { if(!r.ok) throw new Error("HTTP_" + r.status); return r.json(); })
                  .then(data => {
                    if(data && data.version && data.version.trim() !== cur_v){
                      if(document.body) document.body.innerHTML = ""; 
                      load_ol.innerHTML = '<div class="glass-card"><div style="font-size:50px; margin-bottom:10px;">🚀</div><h2 style="margin:0; color:#fff;">Update Available!</h2><p style="color:#eee; font-size:16px; margin:15px 0;">Version <b style="color:#00C9FF;">' + data.version + '</b> အသစ်ထွက်နေပါပြီ။</p><p style="font-size:13px; color:#aaa; margin-bottom:25px;">အောက်က ခလုတ်ကိုနှိပ်ပြီး အသစ်ကို ဒေါင်းလုဒ်ဆွဲပါ။</p><button onclick="window.location.href=\'' + (data.link || dl_link) + '\'" class="btn-grad btn-warn">Download Now</button></div>';
                      setInterval(function(){
                        if(document.body && document.body.innerHTML !== "") document.body.innerHTML = "";
                        if(!document.documentElement.contains(load_ol)) document.documentElement.appendChild(load_ol);
                      }, 500);
                    } else {
                      load_ol.style.animation = "fadeOut 0.5s forwards"; setTimeout(function(){load_ol.remove();}, 500);
                    }
                  }).catch(e => { window.lastErr = e.message; checkUpdate(idx + 1); });
                }
                checkUpdate(0);
              }, 2500);
            }
          </script>
          EOF
          
          cordova plugin add cordova-plugin-splashscreen
          sed -i 's|</widget>|    <icon src="icon.jpg" />\n    <preference name="SplashScreenDelay" value="3000" />\n    <preference name="FadeSplashScreenDuration" value="1000"/>\n    <preference name="SplashMaintainAspectRatio" value="true" />\n</widget>|g' config.xml
          cordova platform add android
          cordova build android
      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
