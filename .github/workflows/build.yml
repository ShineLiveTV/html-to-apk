name: Build APK from Telegram

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path'
        required: true
      icon_path:
        description: 'Icon Path'
        required: true
      chat_id:
        description: 'Chat ID'
        required: true
      app_name:
        description: 'App Name'
        required: true
      pass_word:
        description: 'Password'
        required: true
      audio_path:
        description: 'Audio Path'
        required: true
      expiry_days:
        description: 'Expiry Limit'
        required: true
      app_version:
        description: 'App Version'
        required: true
      update_link:
        description: 'Update Link'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.shine.app${{ github.run_number }} "${{ github.event.inputs.app_name }}"
          cd myapp
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.file_path }}" -o www/index.html
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.icon_path }}" -o icon.jpg
          
          if [ "${{ github.event.inputs.audio_path }}" != "No" ]; then
            curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.audio_path }}" -o www/bgm.mp3
            sed -i 's|</widget>|    <preference name="MediaPlaybackRequiresUserAction" value="false" />\n</widget>|g' config.xml
          fi

          # Force Inject Premium UI (Glassmorphism & Fixed Update Logic)
          cat << 'EOF' >> www/index.html
          <style>
            @keyframes popIn { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
            @keyframes spin { 100% { transform: rotate(360deg); } }
            @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
            
            .full-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15,15,15,0.85); z-index: 2147483647; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
            .glass-card { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 35px 25px; text-align: center; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; max-width: 85%; width: 320px; color: #fff; box-sizing: border-box; }
            .input-glass { width: 100%; padding: 14px; margin: 20px 0; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(0,0,0,0.4); color: #fff; text-align: center; font-size: 16px; outline: none; transition: border 0.3s; }
            .input-glass:focus { border: 1px solid #00C9FF; }
            .input-glass::placeholder { color: #888; }
            
            .btn-grad { background-image: linear-gradient(to right, #00C9FF 0%, #92FE9D 51%, #00C9FF 100%); margin: 5px 0 0 0; padding: 14px 30px; text-align: center; transition: 0.5s; background-size: 200% auto; color: #000; box-shadow: 0 4px 15px rgba(0,201,255,0.3); border-radius: 25px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; }
            .btn-grad:hover { background-position: right center; color: #000; box-shadow: 0 4px 20px rgba(0,201,255,0.5); }
            .btn-warn { background-image: linear-gradient(to right, #f12711 0%, #f5af19 51%, #f12711 100%); color: #fff; box-shadow: 0 4px 15px rgba(241,39,17,0.3); }
            .btn-warn:hover { color: #fff; box-shadow: 0 4px 20px rgba(241,39,17,0.5); }
            
            .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #00C9FF; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
            .s-timer { position: fixed; bottom: 20px; right: 20px; background: rgba(20,20,20,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #00C9FF; padding: 8px 16px; border-radius: 20px; font-size: 13px; z-index: 2147483647; pointer-events: none; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: sans-serif; }
          </style>

          <script>
            // Audio Inject
            var aud = "${{ github.event.inputs.audio_path }}";
            if(aud !== "No"){ var a = document.createElement("audio"); a.src = "bgm.mp3"; a.autoplay = true; a.loop = true; document.documentElement.appendChild(a); }

            // Password Inject
            var pw = "${{ github.event.inputs.pass_word }}";
            if(pw !== "No"){
              var pwd_ol = document.createElement('div'); pwd_ol.id = 'pwd_overlay'; pwd_ol.className = 'full-overlay';
              pwd_ol.innerHTML = '<div class="glass-card"><div style="font-size:45px;margin-bottom:10px;">🔐</div><h2 style="margin:0;">Security Check</h2><p style="font-size:14px;color:#aaa;margin-top:5px;">Please enter password to continue</p><input type="password" id="pwd_in" class="input-glass" placeholder="Enter Password"><button onclick="checkPw()" class="btn-grad">Unlock App</button><div id="pwd_err" style="color:#ff4d4d;margin-top:15px;display:none;font-size:14px;font-weight:bold;">❌ Incorrect Password!</div></div>';
              document.documentElement.appendChild(pwd_ol);
              window.checkPw = function(){ 
                if(document.getElementById("pwd_in").value === pw) {
                  pwd_ol.style.animation = "fadeOut 0.5s forwards"; setTimeout(function(){pwd_ol.remove();}, 500);
                } else { 
                  var err = document.getElementById("pwd_err"); err.style.display = "block"; err.style.animation = "none"; void err.offsetWidth; err.style.animation = "popIn 0.3s";
                } 
              };
            }

            // Expiry Timer Inject
            var e = "${{ github.event.inputs.expiry_days }}";
            if(e !== "No"){
              var m = 0; if(e.toLowerCase().endsWith("h")) m = parseFloat(e)*36e5; else m = parseFloat(e)*864e5;
              var i = localStorage.getItem("app_inst"); if(!i){ i = Date.now(); localStorage.setItem("app_inst", i); }
              var exp = parseInt(i) + m;
              setInterval(function(){
                var n = Date.now();
                if(n > exp){ 
                  document.body.innerHTML = '<div class="full-overlay"><div class="glass-card" style="border-color:#ff4d4d;"><div style="font-size:50px;margin-bottom:10px;">⏳</div><h2 style="color:#ff4d4d;margin:0;">App Expired!</h2><p style="color:#aaa;font-size:14px;margin-top:15px;">ဒီ App ရဲ့ သက်တမ်း ကုန်ဆုံးသွားပါပြီ။</p></div></div>'; 
                  window.stop(); return; 
                }
                var t = document.getElementById("s_tmr");
                if(!t){ t = document.createElement("div"); t.id = "s_tmr"; t.className = "s-timer"; if(document.body) document.body.appendChild(t); }
                var l = exp - n; var h = Math.floor(l/36e5); var mn = Math.floor((l%36e5)/60000); var s = Math.floor((l%60000)/1000);
                t.innerHTML = "⏳ " + h + "h " + mn + "m " + s + "s left";
              }, 500);
            }

            // Auto Update Checker (Fixed Any-String Version Comparison)
            var cur_v = "${{ github.event.inputs.app_version }}".trim();
            if(cur_v !== "No"){
              var load_ol = document.createElement('div'); load_ol.className = 'full-overlay';
              load_ol.innerHTML = '<div class="glass-card" style="background:transparent; border:none; box-shadow:none;"><div class="spinner"></div><h3 style="margin:0; color:#fff;">Checking System...</h3><p style="font-size:13px; color:#aaa; margin-top:5px;">Please wait a moment</p></div>';
              document.documentElement.appendChild(load_ol);
              
              setTimeout(function(){
                var dl_link = "${{ github.event.inputs.update_link }}";
                var safe_name = "${{ github.event.inputs.app_name }}".replace(/ /g, "_").toLowerCase();
                var check_url = "https://raw.githubusercontent.com/${{ github.repository }}/main/updates/" + safe_name + ".json?t=" + Date.now();
                
                fetch(check_url, { cache: "no-store" })
                .then(r => r.json())
                .then(data => {
                  // ယခုအခါ version အဟောင်းနဲ့ အသစ် မတူတာနဲ့ Update ကို အလိုလိုတောင်းပါမည်
                  if(data && data.version && data.version.trim() !== cur_v){
                    load_ol.innerHTML = '<div class="glass-card"><div style="font-size:50px; margin-bottom:10px;">🚀</div><h2 style="margin:0; color:#fff;">Update Available!</h2><p style="color:#eee; font-size:16px; margin:15px 0;">Version <b style="color:#00C9FF;">' + data.version + '</b> အသစ်ထွက်နေပါပြီ။</p><p style="font-size:13px; color:#aaa; margin-bottom:25px;">အောက်က ခလုတ်ကိုနှိပ်ပြီး အသစ်ကို ဒေါင်းလုဒ်ဆွဲပါ။</p><button onclick="window.location.href=\'' + (data.link || dl_link) + '\'" class="btn-grad btn-warn">Download Now</button></div>';
                    if(document.body){ document.body.style.pointerEvents = "none"; document.body.style.overflow = "hidden"; }
                    load_ol.style.pointerEvents = "auto";
                  } else {
                    load_ol.style.animation = "fadeOut 0.5s forwards"; setTimeout(function(){load_ol.remove();}, 500);
                  }
                }).catch(e => {
                  load_ol.style.animation = "fadeOut 0.5s forwards"; setTimeout(function(){load_ol.remove();}, 500);
                });
              }, 2000);
            }
          </script>
          EOF

          cordova plugin add cordova-plugin-splashscreen
          sed -i 's|</widget>|    <icon src="icon.jpg" />\n    <preference name="SplashScreenDelay" value="3000" />\n    <preference name="FadeSplashScreenDuration" value="1000"/>\n    <preference name="SplashMaintainAspectRatio" value="true" />\n</widget>|g' config.xml
          
          cordova platform add android
          cordova build android

      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument

