name: Build APK from Telegram

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path'
        required: true
      icon_path:
        description: 'Icon Path'
        required: true
      chat_id:
        description: 'Chat ID'
        required: true
      app_name:
        description: 'App Name'
        required: true
      pass_word:
        description: 'Password'
        required: true
      audio_path:
        description: 'Audio Path'
        required: true
      expiry_days:
        description: 'Expiry Limit'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build APK
        run: |
          npm install -g cordova
          cordova create myapp com.shine.app${{ github.run_number }} "${{ github.event.inputs.app_name }}"
          cd myapp
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.file_path }}" -o www/index.html
          curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.icon_path }}" -o icon.jpg
          
          # Password Inject
          if [ "${{ github.event.inputs.pass_word }}" != "No" ]; then
            sed -i 's|<body>|<body><div id="pwd_overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;"><h2 style="color:#fff;font-family:sans-serif;">🔐 Enter Password</h2><input type="password" id="pwd_in" style="margin:15px;padding:12px;border-radius:8px;border:none;text-align:center;font-size:18px;width:250px;"><button onclick="checkPw()" style="padding:12px 25px;background:#FFD700;border:none;border-radius:8px;font-size:16px;font-weight:bold;">Unlock</button><div id="pwd_err" style="color:red;margin-top:15px;display:none;font-family:sans-serif;">Incorrect Password!</div></div><script>function checkPw(){if(document.getElementById("pwd_in").value==="${{ github.event.inputs.pass_word }}"){document.getElementById("pwd_overlay").style.display="none";}else{document.getElementById("pwd_err").style.display="block";}}</script>|gi' www/index.html
          fi

          # Expiry Inject (Hours/Days + Myanmar Time)
          if [ "${{ github.event.inputs.expiry_days }}" != "No" ]; then
            sed -i 's|<head>|<head><script>(function(){var e="${{ github.event.inputs.expiry_days }}";if(e!=="No"){var m=0;if(e.toLowerCase().endsWith("h"))m=parseFloat(e)*36e5;else m=parseFloat(e)*864e5;var i=localStorage.getItem("app_inst");if(!i){i=Date.now();localStorage.setItem("app_inst",i);}if(Date.now()-i>m){var d=new Date(parseInt(i)+m).toLocaleString("en-US",{timeZone:"Asia/Yangon"});document.write("<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;color:#ff4444;font-family:sans-serif;padding:20px;text-align:center;box-sizing:border-box;"><h2>⚠️ App Expired!</h2><p>ဒီ App ရဲ့ သက်တမ်း ကုန်ဆုံးသွားပါပြီ။</p><p style="font-size:14px;color:#888;margin-top:20px;">Expired at:<br>"+d+" (MMT)</p></div>");window.stop();}})();</script>|gi' www/index.html
          fi

          # Audio Inject
          if [ "${{ github.event.inputs.audio_path }}" != "No" ]; then
            curl -L "https://api.telegram.org/file/bot${{ secrets.BOT_TOKEN }}/${{ github.event.inputs.audio_path }}" -o www/bgm.mp3
            sed -i 's|<body>|<body><audio src="bgm.mp3" autoplay loop></audio>|gi' www/index.html
            sed -i 's|</widget>|    <preference name="MediaPlaybackRequiresUserAction" value="false" />
</widget>|g' config.xml
          fi

          # Splash Screen Config
          cordova plugin add cordova-plugin-splashscreen
          sed -i 's|</widget>|    <icon src="icon.jpg" />
    <preference name="SplashScreenDelay" value="3000" />
    <preference name="FadeSplashScreenDuration" value="1000"/>
    <preference name="SplashMaintainAspectRatio" value="true" />
</widget>|g' config.xml
          
          cordova platform add android
          cordova build android

      - name: Send to TG
        run: |
          curl -F chat_id="${{ github.event.inputs.chat_id }}" -F document=@"myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk" https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
